<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Background Remover</title>

<!-- use by bg remover api key -->

<style>

body{
font-family:Arial;
text-align:center;
padding:40px;
background:#f4f6ff;
}

h1{
margin-bottom:20px;
}

.upload{
border:2px dashed #4f46e5;
padding:40px;
width:350px;
margin:auto;
border-radius:12px;
cursor:pointer;
background:white;
}

input{
display:none;
}

.preview{
margin-top:25px;
}

.preview img{
max-width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

button{
margin:10px;
padding:12px 25px;
border:none;
background:#4f46e5;
color:white;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#4338ca;
}

.loader{
margin-top:15px;
display:none;
font-size:14px;
color:#444;
}

</style>

</head>

<body>

<h1>AI Background Remover</h1>

<div class="upload" onclick="fileInput.click()">
Click to Upload Image
<input type="file" id="fileInput" accept="image/*">
</div>

<div class="preview">
<img id="previewImage">
</div>

<br>

<button id="removeBtn">Remove Background</button>

<button id="downloadBtn">Download PNG</button>

<div class="loader" id="loader">
Removing background...
</div>

<footer>
    <P>Powered by <strong>Techtoolkit</strong>.</P>
</footer>

<script>

const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("previewImage")

const removeBtn = document.getElementById("removeBtn")
const downloadBtn = document.getElementById("downloadBtn")

const loader = document.getElementById("loader")

let uploadedFile = null
let resultUrl = null


fileInput.addEventListener("change", e=>{

uploadedFile = e.target.files[0]

preview.src = URL.createObjectURL(uploadedFile)

})


removeBtn.addEventListener("click", async ()=>{

if(!uploadedFile){
alert("Upload image first")
return
}

loader.style.display="block"

const formData = new FormData()

formData.append("image_file", uploadedFile)
formData.append("size","auto")

const response = await fetch("https://api.remove.bg/v1.0/removebg",{

method:"POST",

headers:{
"X-Api-Key":"BXwAL4Rrw7jJ9Ea3CKt1Y3Cc"
},

body:formData

})

const blob = await response.blob()

resultUrl = URL.createObjectURL(blob)

preview.src = resultUrl

loader.style.display="none"

})


downloadBtn.addEventListener("click", ()=>{

if(!resultUrl){
alert("Remove background first")
return
}

const a = document.createElement("a")

a.href = resultUrl
a.download = "bg-removed.png"

a.click()

})

</script>

</body>
</html>
